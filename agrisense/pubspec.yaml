name: crop_app
description: Crop Health & Yield Prediction - AI Powered Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # HTTP
  dio: ^5.4.0

  # Image Picker
  image_picker: ^1.0.7

  # Local Storage (History)
  shared_preferences: ^2.2.2

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # Voice Assistant
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  http: ^1.2.0
  animate_do: ^3.3.4
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
